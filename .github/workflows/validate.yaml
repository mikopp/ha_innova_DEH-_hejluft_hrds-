# Standalone HACS validation.
#
# A focused, permission-less HACS validation job. It is intentionally separate
# from hacs.yaml so it can run with `permissions: {}` (no token scopes) and on a
# daily schedule, giving an extra safety net that the repository stays a valid
# HACS integration even when nothing is being pushed.
name: Validate

on:
  push:
  pull_request:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions: {}

jobs:
  validate-hacs:
    runs-on: ubuntu-latest
    steps:
      - name: HACS validation
        uses: hacs/action@main
        with:
          category: integration
