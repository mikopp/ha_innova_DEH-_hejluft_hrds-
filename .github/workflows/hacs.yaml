# HACS (Home Assistant Community Store) validation.
#
# Validates that the repository is a well-formed HACS "integration": correct
# repository structure, a hacs.json, a README, a valid manifest, etc. This is
# what lets users install the integration as a HACS custom repository. Runs on
# every push, on pull requests, and once a day on a schedule so we notice if a
# change in HACS' rules breaks the repo.
name: HACS

on:
  push:
  pull_request:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: hacs/action@d556e736723344f83838d08488c983a15381059a # 22.5.0
        with:
          category: integration
          ignore: brands
