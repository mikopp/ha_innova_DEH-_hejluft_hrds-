# Python linting & formatting check.
#
# Runs Ruff (linter + formatter) over the whole repository on every push and
# pull request. This is the fast "is the Python clean?" gate:
#   * `ruff check`  -> static lint rules (pyflakes/pycodestyle/isort, see ruff.toml)
#   * `ruff format --check` -> fails if any file is not formatted
# It does NOT import Home Assistant, so it is quick and has no HA dependency.
name: Lint

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
      - name: Install Ruff
        run: pip install ruff
      - name: Ruff lint
        run: ruff check .
      - name: Ruff format check
        run: ruff format --check .
