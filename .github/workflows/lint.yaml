# Python linting & formatting check.
#
# Runs Ruff (linter + formatter) over the whole repository on every push and
# pull request. This is the fast "is the Python clean?" gate:
#   * `ruff check`  -> static lint rules (pyflakes/pycodestyle/isort, see ruff.toml)
#   * `ruff format --check` -> fails if any file is not formatted
# It does NOT import Home Assistant, so it is quick and has no HA dependency.
name: Lint

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Install Ruff
        run: pip install ruff
      - name: Ruff lint
        run: ruff check .
      - name: Ruff format check
        run: ruff format --check .
